source = colors.conf
$Scripts = $HOME/.config/hypr/scripts

# ============================================================================
# Music Player Widget — Top Right Corner
# ============================================================================

# ----------------------------------------------------------------------------
# Background box
# ----------------------------------------------------------------------------
shape {
    monitor =
    color = rgba(255, 255, 255, 0.08)
    size = 260, 120
    rounding = 16
    border_size = 1
    border_color = $secondary
    position = -20, -20
    halign = right
    valign = top
    zindex = 0
}

# ----------------------------------------------------------------------------
# Album Art
# ----------------------------------------------------------------------------
image {
    monitor =
    path = $HOME/.config/hypr/scripts/music.webp
    size = 72
    rounding = 8
    border_size = 2
    border_color = $source_color
    rotate = 0
    reload_time = 2
    reload_cmd = $Scripts/hyprlock-music.sh --art
    position = -100, -24
    halign = right
    valign = top
    zindex = 1
}

# ----------------------------------------------------------------------------
# Track title
# ----------------------------------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --title)"
    color = $on_secondary_container
    font_size = 12
    font_family = JetBrainsMono NFM Bold
    position = -108, -20
    halign = right
    valign = top
    zindex = 1
}

# ----------------------------------------------------------------------------
# Artist
# ----------------------------------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "󰠃  $(~/.config/hypr/scripts/hyprlock-music.sh --artist)"
    color = $secondary
    font_size = 10
    font_family = JetBrainsMono NFM
    position = -108, -38
    halign = right
    valign = top
    zindex = 1
}

# ----------------------------------------------------------------------------
# Player source (Spotify, Firefox, etc.)
# ----------------------------------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --player)"
    color = $secondary
    font_size = 9
    font_family = JetBrainsMono NFM
    position = -108, -53
    halign = right
    valign = top
    zindex = 1
}

# ----------------------------------------------------------------------------
# Progress bar
# ----------------------------------------------------------------------------
# Current time
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --position)"
    color = $secondary
    font_size = 9
    font_family = JetBrainsMono NFM
    position = -230, -70
    halign = right
    valign = top
    zindex = 1
}

# Bar
label {
    monitor =
    text = cmd[update:1000] $Scripts/hyprlock-music.sh --progress-bar
    color = $source_color
    font_size = 9
    font_family = JetBrainsMono NFM
    position = -155, -70
    halign = right
    valign = top
    zindex = 1
}

# Total length
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --length)"
    color = $secondary
    font_size = 9
    font_family = JetBrainsMono NFM
    position = -25, -70
    halign = right
    valign = top
    zindex = 1
}

# ----------------------------------------------------------------------------
# Playback controls
# ----------------------------------------------------------------------------
# Previous
label {
    monitor =
    text = 󰒮
    color = $on_secondary_container
    font_size = 18
    onclick = playerctl previous
    position = -175, -92
    halign = right
    valign = top
    zindex = 1
}

# Play / Pause
label {
    monitor =
    text = cmd[update:1000] $Scripts/hyprlock-music.sh --status
    color = $source_color
    font_size = 20
    onclick = playerctl play-pause
    position = -145, -92
    halign = right
    valign = top
    zindex = 1
}

# Next
label {
    monitor =
    text = 󰒭
    color = $on_secondary_container
    font_size = 18
    onclick = playerctl next
    position = -110, -92
    halign = right
    valign = top
    zindex = 1
}