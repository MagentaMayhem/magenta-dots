
# TAGS

# multimedia-video tags
windowrule = match:class ^([Mm]pv|vlc)$, tag +multimedia_video

# settings tags
windowrule = match:class ^(org\.pulseaudio\.pavucontrol)$, tag +settings

# viewer tags
windowrule = match:class ^(evince|eog|org\.gnome\.Loupe)$, tag +viewer

# terminal tags
windowrule = match:class ^(kitty)$, tag +terminal

# im tags
windowrule = match:class ^([Dd]iscord|[Vv]esktop)$, tag +im
windowrule = match:class ^(org\.telegram\.desktop)$, tag +im

# projects tags
windowrule = match:class ^(Spotify)$, tag +multimedia


# TAGS - Special Overrides
windowrule = match:tag multimedia_video, no_blur on
windowrule = match:tag multimedia_video, opacity 1.0


# FLOAT
windowrule = match:tag settings, float on, center on
windowrule = match:tag viewer, float on, center on
windowrule = match:tag multimedia_video, float on, center on


# OPACITY
windowrule = match:tag terminal, opacity 0.9 0.7
windowrule = match:tag settings, opacity 0.8 0.7
windowrule = match:tag im, opacity 0.85 0.7
windowrule = match:tag multimedia, opacity 0.8 0.6
windowrule = match:class ^(gedit|mousepad|org\.gnome\.TextEditor)$, opacity 0.9 0.8
windowrule = match:class ^(org\.gnome\.Nautilus)$, opacity 0.8 0.7
windowrule = match:class ^(com\.stremio\.stremio)$, opacity 1.0 1.0


# SIZE
windowrule = match:tag multimedia_video, size 900 506
windowrule = match:class ^(org\.pulseaudio\.pavucontrol)$, size (monitor_w*0.5) (monitor_h*0.6)

# LAYER RULES
layerrule = match:namespace rofi, blur on
layerrule = match:namespace notifications, blur on
layerrule = match:namespace logout_dialog, blur on 

# MISC FIXES
# Ignore maximize requests
 windowrule = match:class ^(.*)$, suppress_event maximize
# Fix XWayland dragging issues
 windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_focus on

# NAMED RULES - Special Cases
windowrule {
    name = Picture-in-Picture
    match:title = ^(Picture-in-Picture)$
    float = on
    pin = on
    no_focus = off
    no_blur = on
    keep_aspect_ratio = on
    size = (monitor_w*0.25) (monitor_h*0.25)
    move = 1400 780
}
